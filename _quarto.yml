        href: 03-quarto-rmarkdown.qmd
      - text: "4. Running Code in RStudio"
        href: 04-running-code.qmd
      - text: "5. Working with Files and Folders"
        href: 05-files-folders.qmd
      - text: "6. Downloading a CSV Dataset"
        href: 06-download-csv.qmd
      - text: "7. Importing Data into R"
        href: 07-importing-data.qmd
      - text: "8. Getting Results"
        href: 08-getting-results.qmd
      - text: "Common Problems and Solutions"
        href: 09-common-problems.qmd
      - text: "Quick Reference Cheat Sheet"
